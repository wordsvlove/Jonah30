    <script>
        // 靈修資料庫 (31天)
        const devotions = [
            {
                day: 1,
                title: "神的呼召與恩典的起點",
                scriptureRef: "約拿書 1:1-2",
                scriptureText: "耶和華的話臨到亞米太的兒子約拿，說：你起來往尼尼微大城去，向其中的居民呼喊，因為他們的惡達到我面前。",
                content: "神的話語主動臨到先知約拿。尼尼微是一個充滿罪惡的異教大城，但神沒有立刻降下雷火毀滅他們，反而差派先知去宣告信息。這顯示了神在審判之前，總會給予回轉的機會。<br><br>我們常以為神只關心教會裡的人，但這段經文告訴我們，神的眼目察看全地，祂也關心那些在罪惡中迷失的人。神的呼召有時會挑戰我們的舒適圈，要我們去關心我們本來不熟悉、甚至不喜歡的人。<br><br>神愛那些在城中迷失的人。祂問我們是否願意成為祂的出口，將祂的心意傳遞給他們。",
                q1: "神今天是否將某個群體或某個人放在你心裡，要你去關心？",
                q2: "面對神突如其來的呼召，你通常的第一反應是甚麼？",
                prayer: "天父，多謝祢對世人充滿憐憫。求祢擴闊我嘅眼界，等我唔單止睇到自己嘅需要，亦都睇到身邊迷失嘅人。賜我順服嘅心，願意回應祢嘅呼召。阿們。"
            },
            {
                day: 2,
                title: "走自己的路",
                scriptureRef: "約拿書 1:3",
                scriptureText: "約拿卻起來，逃往他施去躲避耶和華；下到約帕，遇見一隻船，要往他施去。他就給了船價，上了船，要與船上的人同往他施去躲避耶和華。",
                content: "約拿聽到了神的吩咐，但他選擇了相反的方向。尼尼微在東邊，他卻買了船票往西邊的他施去。他以為只要走得夠遠，就可以躲避耶和華。<br><br>身為信徒，我們有時也會像約拿一樣。我們明知道神的旨意是甚麼（例如去饒恕、去愛、去放下某種執著），但我們卻選擇「買船票」逃跑，用忙碌的生活或其他的藉口來掩飾。然而，神是無所不在的，我們無法逃離祂的愛，也無法逃離祂為我們預備的最好計劃。<br><br>神問我們覺得自己可以逃到哪裡去。祂的目光從未離開過我們。神呼喚我們回來，告訴我們祂的道路雖然有挑戰，但卻充滿著真實的平安。",
                q1: "你目前的生活中，有沒有哪件事是你正在「逃避神」的？",
                q2: "你覺得神為甚麼不直接任由約拿走掉，而要一直尋找他？",
                prayer: "主耶穌，我承認我有時真係好硬頸，鍾意揀自己嘅路行，避開祢嘅提醒。求祢原諒我嘅任性，幫我迴轉，甘心樂意咁行喺祢嘅旨意當中。阿們。"
            },
            {
                day: 3,
                title: "神恩典的攔阻",
                scriptureRef: "約拿書 1:4",
                scriptureText: "然而耶和華使海中起大風，海就狂風大作，甚至船幾乎破壞。",
                content: "約拿以為一切順利，船也開了。然而，神主動介入了。「耶和華使海中起大風」，這場風暴不是為了摧毀約拿，而是為了攔阻他繼續走在錯誤的道路上。<br><br>當我們偏行己路時，如果一切順利，那反而是危險的。有時候，生命中突如其來的「狂風大作」（可能是計畫受阻、遇到困難），其實是神愛的攔阻。神因為愛我們，所以不忍心看我們越走越遠。祂用風暴來喚醒我們，要將我們帶回祂的同在裡。<br><br>神提醒我們不要抱怨生活中的不順利。有時候，那是祂為我們興起的風暴，目的是要保護我們不至於迷失在沒有祂的汪洋中。",
                q1: "回望過去，有沒有一次「不順利」或「挫折」，最終卻保守了你不偏離正道？",

            },
            {

                content: "在生死存亡的關頭，不認識神的水手們極力自救並呼求神明。而那位認識天地之主的先知約拿，卻在底艙呼呼大睡，對外面的危機毫無反應。<br><br>這是一個強烈的對比。有時候，不認識神的人對社會的危機、別人的需要充滿焦急與關注，而身為基督徒的我們，卻可能因為靈裡的遲鈍而「躺臥沉睡」。我們在自己的小天地裡覺得安穩，卻聽不見外面世界呼救的聲音。神希望我們是一個時刻警醒、與祂同工的人。<br><br>神呼喚我們醒來，這不是睡覺的時候。祂要我們看看周圍的人，因為他們需要認識那真正能平息風浪的主。",
                q1: "你覺得自己目前的屬靈狀態是警醒的，還是沉睡的？",
                q2: "身邊有沒有人在面對人生的風暴，而你過去一直沒有察覺？",
                prayer: "主啊，求祢喚醒我沉睡嘅靈魂。唔好俾我對身邊嘅需要視而不見、麻木不仁。賜我敏銳嘅心，去關心身邊面對緊風暴嘅人。阿們。"
            },
            {
                day: 5,
                title: "藉著他人發出的呼喚",

                content: "船主搖醒了約拿，責備他為甚麼還在睡，並催促他起來禱告。很奇妙，神竟然透過一個不認識耶和華的船主，來喚醒並提醒先知約拿應該做的事。<br><br>神可以使用任何人、任何環境向我們說話。有時，一句來自非信徒的責備、一個來自朋友的提醒，正是神對我們的呼喚。我們不要因為說話者的身分而忽略了其中的真理。當我們靈性軟弱時，神會用各種方法叫我們起來，求告神。<br><br>神說話的聲音有時在微風中，有時在別人的責備裡。只要保持謙卑的心，我們就能聽見祂對我們的呼喚。",
                q1: "神最近有沒有透過身邊的人（甚至是未信主的人）提醒你一些事？",
                q2: "「起來，求告你的神」，這句話對你今天的處境有甚麼意義？",
                prayer: "天父，多謝祢用唔同嘅方法去提醒我。求祢賜我謙卑受教嘅心，無論係邊個講說話，只要係出於祢嘅真理，我都願意虛心聆聽同反省。阿們。"
            },
            {

                scriptureRef: "約拿書 1:7",

                content: "水手們決定用當時流行的方法——掣籤，來找出招惹災禍的人。結果，籤準確無誤地落在了約拿身上。<br><br>在人看來，掣籤是隨機的機率；但在神手中，沒有甚麼是偶然的。《箴言》說：「籤放在懷裡，定事由耶和華。」神掌管著看似隨機的事件，為的是引導我們面對真實的自己。我們生命中遇到的許多「巧合」，其實都是神細心安排的指引，要將我們帶回祂的光中。<br><br>神提醒我們，生命中沒有偶然，一切都在祂的看顧之下。當環境將我們推向某個決定時，不要害怕，因為那裡有祂的帶領。",
                q1: "你生命中有沒有一些看似「偶然」的事件，後來發現其實是神的帶領？",
                q2: "知道神掌管一切「巧合」，如何幫助你面對今天的不確定性？",
                prayer: "主耶穌，我深信我嘅生命冇所謂嘅巧合，一切都有祢嘅帶領。求祢俾我喺每一件大小事上面，都見到祢掌權嘅手，安心信靠祢。阿們。"
            },
            {
                day: 7,
                title: "重拾真身分",

                content: "面對水手們一連串的質問，約拿終於開口了。他沒有隱瞞，坦白宣告自己的身分：「我是希伯來人，我敬畏耶和華」。在逃跑的路上，他第一次重新確認了自己與神的關係。<br><br>無論我們軟弱跌倒了多少次，走偏了多遠，我們作為神兒女的身分永遠不會改變。當約拿承認他是敬畏創造天地之主的人時，他其實也是在對自己的心說話。有時候，我們只需要停下來，宣告我們是屬神的，這份身分的認同，會給我們勇氣去面對錯誤，並重新回到神的懷抱。<br><br>神宣告我們是祂的孩子，這印記永遠刻在我們身上。祂要我們不要讓失敗定義自己，讓我們的真實身分——蒙愛的神兒女——來引導我們前面的路。",
                q1: "在職場或生活中，你容易忘記自己是「敬畏耶滿華」的人嗎？",
                q2: "今天，你可以如何向別人或向自己重新確認你屬神的身分？",
                prayer: "天父，多謝祢，就算我軟弱退後，祢都冇收回我神兒女嘅身分。求祢幫我記住，我係屬祢嘅，等我喺人前人後，都活出敬畏祢嘅生命。阿們。"
            },
            {
                day: 8,
                title: "敬畏與見證",

                content: "水手們聽見約拿是敬畏創造天地海的神，又知道他正在逃避這位神，就大大懼怕。他們震驚於一個信徒竟然會做出違背自己信仰的事。<br><br>這節經文提醒我們，我們生命的見證對身邊的人有著極大的影響。當我們口稱信主，行為卻與信仰不符時，未信主的人也會感到困惑。但神的奇妙在於，即使是約拿這樣失敗的見證，神依然能使用它來讓外邦人認識祂的威嚴。我們不完美，但只要我們誠實面對神，神就能使用我們。<br><br>神告訴我們，我們的坦誠往往比偽裝的完美更能見證祂的恩典。當我們誠實面對自己的軟弱時，別人就能看見神真實的工作。",
                q1: "你覺得自己的行為，能幫助身邊的人更認識神，還是讓他們困惑？",
                q2: "如果有人問起你的信仰與行為不一致時，你會如何坦誠面對？",
                prayer: "主啊，我承認我有時言行不一，求祢赦免我。求祢幫我做一個誠實嘅人，就算喺別人面前承認自己嘅軟弱，都願意高舉祢嘅真實同偉大。阿們。"
            },
            {
                day: 9,
                title: "承擔責任的勇氣",

                scriptureText: "他們問他說：我們當向你怎樣行，使海浪平靜呢？這話是因海浪越發翻騰。他對他們說：你們將我抬起來，拋在海中，海就平靜了；我知道你們遭這大風是因我的緣故。",
                content: "風浪越來越大，約拿沒有將責任推卸給別人或環境。他勇敢地承認是因他的緣故，並提出將自己拋下海。這是一個自我犧牲的決定，也是他順服神主權的開始。<br><br>在困難和衝突中，我們很容易找藉口推卸責任。但屬靈的成長，往往始於我們願意為自己的選擇承擔後果。約拿願意犧牲自己來平息風浪，這隱含了基督的影子——耶穌為我們的罪被釘十字架，平息了神公義的忿怒。當我們願意順服神並承擔責任時，平靜就會來到。<br><br>神喜悅我們勇敢面對自己的錯誤。當我們放下自我保護，把結果交託給祂時，我們會發現祂的恩典比海浪更廣闊。",
                q1: "最近有沒有甚麼事情，是你需要勇敢地說「是因我的緣故」並承擔責任的？",
                q2: "將自己交給神處理，對你現在面對的難題有甚麼幫助？",
                prayer: "主耶穌，賜我勇氣去面對自己嘅過失，唔再推卸責任。我願意將自己同埋我所面對嘅爛攤子，全部交託喺祢手中，因為祢係平息風浪嘅主。阿們。"

                content: "水手們心腸很好，不想拋約拿下海，他們竭力盪槳想要靠岸，但海浪卻更猛烈。最後他們明白人的努力無法對抗神的旨意，於是他們轉向耶和華禱告，承認神的主權。<br><br>很多時候，我們遇到困難時，第一反應也是竭力盪槳——靠自己的聰明、人脈和努力去解決。但如果事情的方向偏離了神的心意，再多的努力也是徒勞。水手們最後放下了船槳，舉起手來禱告。這教導我們，順服神的旨意，比盲目地用力盪槳更為重要。<br><br>神問我們是不是划得很累了。祂要我們停下來，尋求祂的心意。神的意旨是美好的，順服祂，我們就不必在風浪中白費力氣。",
                q1: "你現在是否正在為某件事竭力盪槳，卻感到非常疲憊無力？",

            },

        // UI State
        let currentDay = 1;

        // Elements
        const daysListEl = document.getElementById('days-list');
        const contentContainer = document.getElementById('content-container');
        const menuToggle = document.getElementById('menu-toggle');
        const sidebar = document.getElementById('sidebar');

        // Initializer
        function init() {
            // Get today's date (1-31) to set as default day
            const today = new Date().getDate();
            currentDay = today <= 31 ? today : 1; 

            renderSidebar();
            loadDay(currentDay);

            // Mobile menu toggle
            menuToggle.addEventListener('click', () => {
                sidebar.classList.toggle('-translate-x-full');
            });
            
            // Handle beforeunload to stop speech
            window.addEventListener('beforeunload', () => {
                if(window.speechSynthesis) window.speechSynthesis.cancel();
            });
        }

        // Render Sidebar Days
        function renderSidebar() {
            daysListEl.innerHTML = '';
            devotions.forEach(devotion => {
                const btn = document.createElement('button');
                btn.className = `day-btn w-full text-left px-6 py-3 text-sm transition-colors duration-200 hover:bg-white/10 ${devotion.day === currentDay ? 'active text-purple-300' : 'text-gray-300'}`;
                btn.innerHTML = `Day ${devotion.day}`;
                btn.onclick = () => {
                    if (window.speechSynthesis) window.speechSynthesis.cancel();
                    loadDay(devotion.day);
                    if (window.innerWidth < 768) {
                        sidebar.classList.add('-translate-x-full');
                    }
                };
                daysListEl.appendChild(btn);
            });
        }
        
        // Reset all play buttons to default state
        function resetAllPlayButtons() {
            document.querySelectorAll('.play-btn path').forEach(path => {
                path.setAttribute('d', 'M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z M21 12a9 9 0 11-18 0 9 9 0 0118 0z');
            });
        }
        
        // Play TTS
        window.toggleSpeech = function(rawText, btnId) {
            if (!('speechSynthesis' in window)) {
                return; // Silently fail if not supported
            }
            
            const btn = document.getElementById(btnId);
            if (!btn) return;
            const iconPath = btn.querySelector('path');
            
            const cleanText = rawText.replace(/<[^>]*>?/gm, ''); // Strip HTML tags
            
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                resetAllPlayButtons();
                if (window.currentPlayingBtn === btnId) {
                    window.currentPlayingBtn = null;
                    return;
                }
            }
            
            window.currentPlayingBtn = btnId;
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.lang = 'zh-HK'; // Cantonese
            utterance.rate = 1.5; // 1.5x speed
            
            // Try to find a HK voice explicitly
            const voices = window.speechSynthesis.getVoices();
            const hkVoice = voices.find(v => v.lang === 'zh-HK' || v.lang === 'zh-TW');
            if (hkVoice) {
                utterance.voice = hkVoice;
            }
            
            utterance.onstart = () => {
                resetAllPlayButtons();
                // Change to Stop icon
                iconPath.setAttribute('d', 'M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z');
            };
            
            utterance.onend = () => {
                resetAllPlayButtons();
                window.currentPlayingBtn = null;
            };
            
            utterance.onerror = () => {
                resetAllPlayButtons();
                window.currentPlayingBtn = null;
            };
            
            window.speechSynthesis.speak(utterance);
        };

                        <div class="inline-block bg-white/5 rounded-full px-4 py-1 text-sm text-gray-300 mb-6 font-semibold">
                            ${data.scriptureRef}
                        </div>
                        
                        <!-- 一鍵聆聽全文按鈕 -->
                        <button id="tts-btn-all" onclick="toggleSpeech('${safeAllText}', 'tts-btn-all')" class="play-btn text-white bg-purple-600 hover:bg-purple-500 focus:outline-none flex items-center gap-2 px-6 py-3 rounded-full font-semibold transition-colors shadow-lg shadow-purple-500/30">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            一鍵聆聽全文
                        </button>
                    </div>

                    <div class="glass-panel p-6 md:p-8 mb-8 border-l-4 border-l-purple-400 relative">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-lg font-semibold text-purple-200">今日經文</h3>
                        </div>
                        <p class="text-lg leading-relaxed text-gray-100 italic">「${data.scriptureText}」</p>
                    </div>

                    <div class="mb-10">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-xl font-semibold text-white">靈修內容</h3>
                        </div>
                        <div class="prose prose-invert max-w-none text-gray-300 leading-loose text-justify text-base md:text-lg">
                            ${data.content}
                        </div>
                    </div>

                    <div class="mb-10">
                        <div class="flex items-center mb-4">
                            <div class="w-8 h-8 rounded-full bg-purple-900/50 flex items-center justify-center mr-3 border border-purple-500/30">
                                <svg class="w-4 h-4 text-purple-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            </div>
                            <h3 class="text-xl font-semibold text-white">深度默想</h3>
                        </div>
                        <ul class="space-y-4 text-gray-300 bg-white/5 p-6 rounded-2xl">
                            <li class="flex items-start">
                                <span class="text-purple-400 mr-2 font-bold">1.</span>
                                <span>${data.q1}</span>
                            </li>
                            <li class="flex items-start">
                                <span class="text-purple-400 mr-2 font-bold">2.</span>
                                <span>${data.q2}</span>
                            </li>
                        </ul>
                    </div>

                    <div class="glass-panel p-6 md:p-8 relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-32 h-32 bg-purple-500/10 rounded-full blur-3xl -mr-10 -mt-10"></div>
                        <h3 class="text-xl font-semibold mb-4 text-white flex items-center">
                            <svg class="w-5 h-5 mr-2 text-purple-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M14.707 10.293a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 111.414-1.414L9 12.586V5a1 1 0 012 0v7.586l2.293-2.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>
                            回應禱告
                        </h3>
                        <p class="text-gray-200 leading-relaxed italic">
                            「${data.prayer}」
                        </p>
                    </div>
                `;

                // Fade in
                contentContainer.classList.remove('opacity-0');
                contentContainer.classList.add('opacity-100');
                
                // Scroll to top
                document.querySelector('main').scrollTop = 0;
            }, 300);
        }

        // Initialize voices on load to avoid delay
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = function() {
                window.speechSynthesis.getVoices();
            };
        }

        // Run on load
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
